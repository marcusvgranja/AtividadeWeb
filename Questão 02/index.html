<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilo/global.css">
    <title>Questão 02</title>
</head>
<body>

    <div class="container">
        <!-- 1. TÍTULO -->
        <h1>Cálculo de Média de Notas</h1>

        <!-- 2. ENUNCIADO -->
        <p class="enunciado">
            Crie um programa que solicite ao usuário 4 notas e, em seguida, calcule a média aritmética
            das notas. Adicione um parágrafo no documento HTML informando se o aluno foi aprovado (média
            maior ou igual a 7) ou reprovado (média menor que 7).
        </p>

        <!-- 3. INTERAÇÃO -->
        <div class="funcionalidade">
        <label for="n1">Nota 1:</label>
        <input type="number" id="n1" min="0" max="10" step="0.1">

        <label for="n2">Nota 2:</label>
        <input type="number" id="n2" min="0" max="10" step="0.1">

        <label for="n3">Nota 3:</label>
        <input type="number" id="n3" min="0" max="10" step="0.1">

        <label for="n4">Nota 4:</label>
        <input type="number" id="n4" min="0" max="10" step="0.1">

        <button class="verificar" onclick="CalcularMedia()">Calcular Média</button>
        </div>

        <div class="res" id="res">
            
        </div>

        <a href="../Principal/index.html" class="voltar"> Voltar</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
