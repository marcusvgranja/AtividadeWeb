<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilo/global.css">
    <title>Questão 07</title>
</head>
<body>

    <div class="container">
        <h1>Fatorial de um número</h1>

        <p class="enunciado">
            Crie um programa que solicite ao usuário um número e, em seguida, use um laço de
            repetição “for” para calcular e exibir o fatorial desse número. O fatorial de um número n é o
            produto de todos os inteiros de 1 a n. O usuário não pode entrar com um número maior que 10.
        </p>

        <div class="funcionalidade">
            <label for="txtx">Digite um número para calcular o seu fatorial:</label>
            <input type="number" id="txtn">
            <button class="verificar" onclick="gerarFatorial()">Gerar Fatorial</button>
        </div>

        <div class="res" id="res">
        </div>

        <a href="../Principal/index.html" class="voltar"> Voltar</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
